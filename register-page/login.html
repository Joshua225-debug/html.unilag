<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MasterCBT - Login / Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #111111;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
        padding: 20px;
      }

      .auth-container {
        background: #1a1a1a;
        border-radius: 20px;
        padding: 40px;
        width: 100%;
        max-width: 460px;
        border: 1px solid #2a2a2a;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }

      .auth-logo {
        text-align: center;
        margin-bottom: 8px;
      }

      .auth-logo h2 {
        color: #ffffff;
        font-size: 2rem;
        font-weight: 800;
      }

      .auth-logo h2 span {
        color: #f0c040;
      }

      .unilag-badge {
        display: inline-block;
        background: #f0c040;
        color: #000000;
        font-size: 0.75rem;
        font-weight: 700;
        padding: 4px 14px;
        border-radius: 50px;
        margin-bottom: 8px;
      }

      .auth-subtitle {
        color: #aaaaaa;
        font-size: 0.9rem;
        text-align: center;
        margin-bottom: 28px;
      }

      /* Tabs */
      .auth-tabs {
        display: flex;
        background: #111111;
        border-radius: 10px;
        padding: 4px;
        margin-bottom: 28px;
        border: 1px solid #2a2a2a;
      }

      .auth-tab {
        flex: 1;
        text-align: center;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        color: #aaaaaa;
        font-weight: 600;
        font-size: 0.95rem;
        transition: all 0.3s;
        border: none;
        background: transparent;
      }

      .auth-tab.active {
        background: #f0c040;
        color: #000000;
      }

      /* Forms */
      .auth-form {
        display: none;
      }
      .auth-form.active {
        display: block;
      }

      .form-group {
        margin-bottom: 18px;
      }

      .form-group label {
        color: #aaaaaa;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 8px;
        display: block;
      }

      .form-group input {
        width: 100%;
        background: #111111;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        padding: 12px 16px;
        color: #ffffff;
        font-size: 0.95rem;
        transition: border 0.3s;
        outline: none;
      }

      .form-group input:focus {
        border-color: #f0c040;
      }
      .form-group input::placeholder {
        color: #555555;
      }

      .forgot-link {
        text-align: right;
        margin-bottom: 20px;
        margin-top: -10px;
      }

      .forgot-link a {
        color: #f0c040;
        font-size: 0.85rem;
        text-decoration: none;
      }

      .auth-btn {
        width: 100%;
        background: #f0c040;
        color: #000000;
        border: none;
        border-radius: 8px;
        padding: 14px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.3s;
        margin-top: 4px;
      }

      .auth-btn:hover {
        background: #d4a800;
      }

      .auth-footer {
        text-align: center;
        margin-top: 16px;
        color: #666666;
        font-size: 0.9rem;
      }

      .auth-footer a {
        color: #f0c040;
        text-decoration: none;
        font-weight: 600;
      }

      .terms {
        color: #555555;
        font-size: 0.8rem;
        text-align: center;
        margin-top: 12px;
        line-height: 1.5;
      }

      .terms a {
        color: #f0c040;
        text-decoration: none;
      }

      .back-home {
        text-align: center;
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid #2a2a2a;
      }

      .back-home a {
        color: #aaaaaa;
        text-decoration: none;
        font-size: 0.9rem;
        transition: color 0.3s;
      }

      .back-home a:hover {
        color: #f0c040;
      }

      /* Responsive */
      @media (max-width: 480px) {
        .auth-container {
          padding: 28px 20px;
        }

        .auth-logo h2 {
          font-size: 1.6rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <!-- Logo -->
      <div class="auth-logo">
        <span class="unilag-badge">UNILAG Post-UTME</span>
        <h2>Master<span>CBT</span></h2>
      </div>
      <p class="auth-subtitle" id="auth-subtitle">
        Login to continue your preparation
      </p>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">
          Login
        </button>
        <button class="auth-tab" onclick="switchTab('register')">
          Register
        </button>
      </div>

      <!-- Login Form -->
      <div class="auth-form active" id="login-form">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="Enter your email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" />
        </div>
        <div class="forgot-link">
          <a href="#">Forgot password?</a>
        </div>
        <button class="auth-btn" onclick="loginUser()">
          Login to My Account →
        </button>

        <div class="auth-footer">
          Don't have an account?
          <a href="#" onclick="switchTab('register')">Register here</a>
        </div>
      </div>

      <!-- Register Form -->
      <div class="auth-form" id="register-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="Enter your full name" />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="Enter your email" />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" placeholder="e.g. 08012345678" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Create a strong password" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" placeholder="Repeat your password" />
        </div>
        <!--<button
          class="auth-btn"
          onclick="window.location.href = '../home-page/home.html'"
        >
          Create My Account →
        </button>-->
        <button class="auth-btn" onclick="registerUser()">
          Create My Account →
        </button>
        <div class="terms">
          By registering you agree to our
          <a href="#">Terms of Service</a> and
          <a href="#">Privacy Policy</a>
        </div>
        <div class="auth-footer">
          Already have an account?
          <a href="#" onclick="switchTab('login')">Login here</a>
        </div>
      </div>

      <!-- Back to home -->
      <div class="back-home">
        <a href="../home-page/index.html">← Back to Home</a>
      </div>
    </div>

    <script>
      function switchTab(tab) {
        document
          .querySelectorAll(".auth-tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".auth-form")
          .forEach((f) => f.classList.remove("active"));

        if (tab === "login") {
          document.querySelectorAll(".auth-tab")[0].classList.add("active");
          document.getElementById("login-form").classList.add("active");
          document.getElementById("auth-subtitle").textContent =
            "Login to continue your preparation";
        } else {
          document.querySelectorAll(".auth-tab")[1].classList.add("active");
          document.getElementById("register-form").classList.add("active");
          document.getElementById("auth-subtitle").textContent =
            "Join thousands of UNILAG aspirants";
        }
      }
    </script>
    <script>
      function loginUser() {
        const email = document.querySelector(
          '#login-form input[type="email"]',
        ).value;
        const password = document.querySelector(
          '#login-form input[type="password"]',
        ).value;

        if (!email || !password) {
          alert("Please fill in all fields!");
          return;
        }

        const name = email.split("@")[0];
        localStorage.setItem("masterCbtUser", name);
        window.location.href = "../home-page/index.html";
      }

      function registerUser() {
        const name = document.querySelector(
          '#register-form input[type="text"]',
        ).value;
        const email = document.querySelector(
          '#register-form input[type="email"]',
        ).value;
        const phone = document.querySelector(
          '#register-form input[type="tel"]',
        ).value;
        const password = document.querySelectorAll(
          '#register-form input[type="password"]',
        )[0].value;
        const confirm = document.querySelectorAll(
          '#register-form input[type="password"]',
        )[1].value;

        if (!name || !email || !phone || !password || !confirm) {
          alert("Please fill in all fields!");
          return;
        }

        if (password !== confirm) {
          alert("Passwords do not match!");
          return;
        }

        localStorage.setItem("masterCbtUser", name);
        window.location.href = "../home-page/index.html";
      }
    </script>
  </body>
</html>
